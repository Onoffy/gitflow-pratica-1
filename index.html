<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Tarefas</title>

  <!-- Arquivo CSS externo -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- Header -->
  <header>
    <div class="container">
      <h1>Lista de Tarefas</h1>
      <p>Organize suas atividades de forma simples e eficiente</p>
    </div>
  </header>

  <!-- Main -->
  <main>
    <div class="container">
      <section class="task-section">
        <h2>Tarefas Pendentes</h2>

        <!-- Formulário -->
        <div class="task-form">
          <input type="text" id="taskInput" placeholder="Digite uma tarefa..." />

          <button id="addTaskBtn">
            Adicionar
            <span class="spinner"></span>
          </button>
        </div>

        <small id="errorMessage"></small>

        <div class="task-list" id="taskList">

          <article class="task-card">
            <div class="task-info">
              <h3>Estudar HTML e CSS</h3>
              <p>Revisar Flexbox, Grid e responsividade.</p>
            </div>

            <span class="status">Pendente</span>
          </article>

          <article class="task-card">
            <div class="task-info">
              <h3>Finalizar projeto da faculdade</h3>
              <p>Entregar o sistema de lista de tarefas.</p>
            </div>

            <span class="status done">
              Concluída
            </span>
          </article>

        </div>
      </section>

      <script src="script.js"></script>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 - Lista de Tarefas</p>
    </div>
  </footer>

</body>

</html>
